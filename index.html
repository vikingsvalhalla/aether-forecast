<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skyline – Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 400% 400%;
      animation: skyShift 12s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a202c;
      position: relative;
      overflow: hidden;
    }

    @keyframes skyShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 60% 40%, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 540px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      margin-bottom: 32px;
    }

    .header-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      margin-bottom: 8px;
    }

    .header-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* Search Bar */
    .search-container {
      margin-bottom: 28px;
      display: flex;
      gap: 8px;
    }

    .search-input {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #1a202c;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .search-input::placeholder {
      color: #a0aec0;
    }

    .search-input:focus {
      outline: none;
      background: #fff;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      transform: translateY(-2px);
    }

    .search-btn {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .search-btn:hover {
      background: #fff;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
    }

    .search-btn:active {
      transform: translateY(0);
    }

    /* Current Weather Card */
    .current-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px 32px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.5);
      animation: slideUp 0.6s ease-out;
      position: relative;
      overflow: hidden;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .current-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, transparent 60%);
      pointer-events: none;
    }

    .current-content {
      position: relative;
      z-index: 1;
    }

    .city-name {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .date-time {
      font-size: 13px;
      color: #718096;
      font-weight: 300;
      margin-bottom: 24px;
      letter-spacing: 0.3px;
    }

    .temp-section {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 24px;
    }

    .temperature {
      font-family: 'Syne', sans-serif;
      font-size: 72px;
      font-weight: 700;
      color: #667eea;
      line-height: 1;
      text-shadow: 0 2px 4px rgba(102, 126, 234, 0.1);
    }

    .weather-icon {
      font-size: 56px;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1));
    }

    .condition {
      font-size: 16px;
      color: #2d3748;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .high-low {
      display: flex;
      gap: 24px;
      font-size: 14px;
      color: #4a5568;
    }

    .high-low span {
      font-weight: 500;
    }

    /* Detail Cards Grid */
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .detail-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .detail-card:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-4px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .detail-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.5) 0%, transparent 60%);
      pointer-events: none;
    }

    .detail-content {
      position: relative;
      z-index: 1;
    }

    .detail-label {
      font-size: 12px;
      color: #718096;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .detail-value {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 4px;
    }

    .detail-unit {
      font-size: 13px;
      color: #a0aec0;
      font-weight: 400;
    }

    /* Forecast Section */
    .forecast-section {
      margin-bottom: 0;
    }

    .forecast-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .forecast-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 8px;
    }

    .forecast-row::-webkit-scrollbar {
      height: 4px;
    }

    .forecast-row::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 2px;
    }

    .forecast-row::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 2px;
    }

    .forecast-card {
      flex: 0 0 90px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .forecast-card:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .forecast-day {
      font-size: 12px;
      color: #718096;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .forecast-icon {
      font-size: 28px;
      margin: 8px 0;
    }

    .forecast-temp {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #1a202c;
    }

    .forecast-temp-low {
      font-size: 12px;
      color: #a0aec0;
      font-weight: 400;
      margin-top: 2px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 16px;
      }

      .header-title {
        font-size: 24px;
      }

      .current-card {
        padding: 32px 24px;
      }

      .temperature {
        font-size: 56px;
      }

      .temp-section {
        gap: 16px;
      }

      .weather-icon {
        font-size: 48px;
      }

      .city-name {
        font-size: 20px;
      }

      .detail-value {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1 class="header-title">Skyline</h1>
      <p class="header-subtitle">Weather at a glance</p>
    </div>

    <!-- Search -->
    <div class="search-container">
      <input 
        type="text" 
        class="search-input" 
        id="searchInput"
        placeholder="Search city..."
        value="San Francisco"
      >
      <button class="search-btn" id="searchBtn">🔍</button>
    </div>

    <!-- Current Weather -->
    <div class="current-card">
      <div class="current-content">
        <h2 class="city-name" id="cityName">San Francisco</h2>
        <p class="date-time" id="dateTime"></p>
        
        <div class="temp-section">
          <span class="temperature" id="temperature">72°</span>
          <span class="weather-icon" id="weatherIcon">⛅</span>
        </div>

        <p class="condition" id="condition">Partly Cloudy</p>
        
        <div class="high-low">
          <div>High: <span id="highTemp">78°</span></div>
          <div>Low: <span id="lowTemp">62°</span></div>
        </div>
      </div>
    </div>

    <!-- Detail Cards -->
    <div class="details-grid">
      <div class="detail-card">
        <div class="detail-content">
          <div class="detail-label">💧 Humidity</div>
          <div class="detail-value" id="humidity">65%</div>
          <div class="detail-unit">Moderate</div>
        </div>
      </div>

      <div class="detail-card">
        <div class="detail-content">
          <div class="detail-label">💨 Wind Speed</div>
          <div class="detail-value" id="windSpeed">12<span class="detail-unit">mph</span></div>
        </div>
      </div>

      <div class="detail-card">
        <div class="detail-content">
          <div class="detail-label">☀️ UV Index</div>
          <div class="detail-value" id="uvIndex">6</div>
          <div class="detail-unit">High</div>
        </div>
      </div>

      <div class="detail-card">
        <div class="detail-content">
          <div class="detail-label">👁️ Visibility</div>
          <div class="detail-value" id="visibility">10<span class="detail-unit">mi</span></div>
        </div>
      </div>
    </div>

    <!-- 5-Day Forecast -->
    <div class="forecast-section">
      <h3 class="forecast-title">5-Day Forecast</h3>
      <div class="forecast-row" id="forecastRow">
        <!-- Forecast cards will be inserted here -->
      </div>
    </div>
  </div>

  <script>
    // Mock data for different cities
    const weatherData = {
      'San Francisco': {
        temp: 72,
        high: 78,
        low: 62,
        condition: 'Partly Cloudy',
        icon: '⛅',
        humidity: 65,
        windSpeed: 12,
        uvIndex: 6,
        visibility: 10,
        forecast: [
          { day: 'Mon', high: 76, low: 61, icon: '🌤️', condition: 'Sunny' },
          { day: 'Tue', high: 74, low: 60, icon: '⛅', condition: 'Cloudy' },
          { day: 'Wed', high: 68, low: 58, icon: '🌧️', condition: 'Rainy' },
          { day: 'Thu', high: 70, low: 59, icon: '⛅', condition: 'Cloudy' },
          { day: 'Fri', high: 75, low: 62, icon: '🌤️', condition: 'Sunny' }
        ]
      },
      'New York': {
        temp: 65,
        high: 71,
        low: 55,
        condition: 'Overcast',
        icon: '☁️',
        humidity: 72,
        windSpeed: 15,
        uvIndex: 4,
        visibility: 8,
        forecast: [
          { day: 'Mon', high: 69, low: 54, icon: '☁️', condition: 'Cloudy' },
          { day: 'Tue', high: 67, low: 53, icon: '🌧️', condition: 'Rainy' },
          { day: 'Wed', high: 64, low: 50, icon: '🌧️', condition: 'Rainy' },
          { day: 'Thu', high: 66, low: 52, icon: '⛅', condition: 'Cloudy' },
          { day: 'Fri', high: 68, low: 55, icon: '🌤️', condition: 'Sunny' }
        ]
      },
      'Los Angeles': {
        temp: 78,
        high: 85,
        low: 68,
        condition: 'Sunny',
        icon: '☀️',
        humidity: 55,
        windSpeed: 8,
        uvIndex: 8,
        visibility: 12,
        forecast: [
          { day: 'Mon', high: 84, low: 67, icon: '☀️', condition: 'Sunny' },
          { day: 'Tue', high: 86, low: 69, icon: '☀️', condition: 'Sunny' },
          { day: 'Wed', high: 82, low: 65, icon: '🌤️', condition: 'Sunny' },
          { day: 'Thu', high: 80, low: 62, icon: '⛅', condition: 'Cloudy' },
          { day: 'Fri', high: 83, low: 66, icon: '☀️', condition: 'Sunny' }
        ]
      },
      'Seattle': {
        temp: 58,
        high: 62,
        low: 48,
        condition: 'Rainy',
        icon: '🌧️',
        humidity: 85,
        windSpeed: 18,
        uvIndex: 2,
        visibility: 6,
        forecast: [
          { day: 'Mon', high: 60, low: 47, icon: '🌧️', condition: 'Rainy' },
          { day: 'Tue', high: 59, low: 46, icon: '🌧️', condition: 'Rainy' },
          { day: 'Wed', high: 61, low: 49, icon: '⛅', condition: 'Cloudy' },
          { day: 'Thu', high: 63, low: 51, icon: '🌤️', condition: 'Sunny' },
          { day: 'Fri', high: 65, low: 52, icon: '☀️', condition: 'Sunny' }
        ]
      }
    };

    // Update current weather display
    function updateWeather(city) {
      const data = weatherData[city];
      if (!data) return;

      document.getElementById('cityName').textContent = city;
      document.getElementById('temperature').textContent = data.temp + '°';
      document.getElementById('weatherIcon').textContent = data.icon;
      document.getElementById('condition').textContent = data.condition;
      document.getElementById('highTemp').textContent = data.high + '°';
      document.getElementById('lowTemp').textContent = data.low + '°';
      document.getElementById('humidity').textContent = data.humidity + '%';
      document.getElementById('windSpeed').textContent = data.windSpeed;
      document.getElementById('uvIndex').textContent = data.uvIndex;
      document.getElementById('visibility').textContent = data.visibility;

      // Update forecast
      const forecastRow = document.getElementById('forecastRow');
      forecastRow.innerHTML = '';
      data.forecast.forEach((day, index) => {
        const card = document.createElement('div');
        card.className = 'forecast-card';
        card.style.animationDelay = `${index * 0.05}s`;
        card.innerHTML = `
          <div class="forecast-day">${day.day}</div>
          <div class="forecast-icon">${day.icon}</div>
          <div class="forecast-temp">${day.high}°</div>
          <div class="forecast-temp-low">${day.low}°</div>
        `;
        forecastRow.appendChild(card);
      });

      // Update date/time
      const now = new Date();
      const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
      document.getElementById('dateTime').textContent = now.toLocaleDateString('en-US', options);
    }

    // Search functionality
    function handleSearch() {
      const input = document.getElementById('searchInput').value.trim();
      if (input) {
        const city = Object.keys(weatherData).find(c => c.toLowerCase() === input.toLowerCase());
        if (city) {
          updateWeather(city);
          document.getElementById('searchInput').value = city;
        } else {
          alert('City not found. Try: San Francisco, New York, Los Angeles, or Seattle');
        }
      }
    }

    document.getElementById('searchBtn').addEventListener('click', handleSearch);
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSearch();
    });

    // Initialize with San Francisco
    updateWeather('San Francisco');
  </script>
</body>
</html>
